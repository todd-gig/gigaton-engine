steps:
  # Build the container image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/gigaton-engine:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/gigaton-engine:latest'
      - '.'

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gigaton-engine:$COMMIT_SHA']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/gigaton-engine:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - gigaton-engine
      - '--image=gcr.io/$PROJECT_ID/gigaton-engine:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--port=8002'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--timeout=60'
      - '--no-allow-unauthenticated'

images:
  - 'gcr.io/$PROJECT_ID/gigaton-engine:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/gigaton-engine:latest'

options:
  logging: CLOUD_LOGGING_ONLY
